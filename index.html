<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library — Rebuild Systematically</title>
  <meta name="description" content="The Claude prompts I use to rebuild my life, one system at a time." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-hover: #1e1e1e;
      --border: #2a2a2a;
      --border-active: #3f3f3f;
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;
      --accent: #e8e8e8;
      --accent-dim: #c0c0c0;
      --tag-bg: #1f1f1f;
      --copy-success: #4ade80;
      --radius: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .site-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    h1 {
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.15;
      margin-top: 10px;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 400;
      margin-top: 8px;
      max-width: 480px;
    }

    .header-count {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      padding-bottom: 4px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--border-active);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
      font-weight: 500;
    }

    /* ── Grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.15s ease, background 0.15s ease;
      position: relative;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--border-active);
    }

    .card.hidden { display: none; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .prompt-block {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--accent-dim);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      max-height: 160px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .prompt-block.expanded {
      max-height: none;
    }

    .prompt-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(transparent, #111);
      pointer-events: none;
    }

    .prompt-block.expanded .prompt-fade { display: none; }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.01em;
    }

    .btn-copy {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-copy:hover {
      background: var(--surface-hover);
      border-color: var(--border-active);
      color: var(--text-primary);
    }

    .btn-copy.copied {
      color: var(--copy-success);
      border-color: var(--copy-success);
    }

    .btn-expand {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
      padding-left: 0;
    }

    .btn-expand:hover {
      color: var(--text-secondary);
      background: transparent;
      border-color: transparent;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      max-width: 1100px;
      margin: 0 auto;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover { color: var(--text-primary); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header, .filter-bar, main { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <p class="site-name">Your Handle · Claude Prompts</p>
      <h1>Prompts That Rebuilt My Life</h1>
      <p class="tagline">Every system I've built starts with a good question. Here's exactly what I ask Claude.</p>
    </div>
    <p class="header-count" id="count"></p>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-cat="all">All</button>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <p>Built by <a href="#" target="_blank">Your Handle</a> · Follow for more systems ↗</p>
</footer>

<script>
  // ─────────────────────────────────────────
  // EDIT YOUR PROMPTS HERE
  // ─────────────────────────────────────────
  const prompts = [
    {
      title: "Weekly Life Audit",
      category: "Reflection",
      description: "A structured review of the past week — what worked, what drained me, and what to adjust.",
      prompt: `I want to do a weekly audit of my life. Ask me questions one at a time about:
1. What I accomplished this week
2. Where I lost time or energy
3. What drained me vs. energized me
4. One thing I'd change next week

After each answer, reflect it back to me and ask the next question. At the end, summarize patterns you notice and give me 3 specific actions for next week.`
    },
    {
      title: "Build a Morning Routine",
      category: "Habits",
      description: "Design a realistic morning routine based on your goals and constraints.",
      prompt: `Help me design a morning routine that actually sticks. Ask me:
- What time I need to start work or leave the house
- My current wake-up time
- My top 3 life priorities right now
- What I've tried before that failed and why

Then build me a 30-minute minimum routine with a version that expands to 60 minutes on good days. Make it specific, not generic.`
    },
    {
      title: "Identify a Self-Sabotage Pattern",
      category: "Mindset",
      description: "Surface the recurring pattern that keeps showing up in different areas of your life.",
      prompt: `I want to identify a self-sabotage pattern I keep repeating. I'll describe a situation where I got in my own way. Ask me clarifying questions to understand:
- What I was trying to achieve
- What I did instead
- How I felt before, during, and after
- Where else this pattern shows up

Then reflect back the pattern you see without judgment, name it, and help me understand what need it's trying to meet. Don't jump to solutions — just help me see clearly first.`
    },
    {
      title: "Reverse-Engineer a Goal",
      category: "Planning",
      description: "Start from the end result and work backwards to today's first action.",
      prompt: `I want to reverse-engineer a goal I have. The goal is: [INSERT YOUR GOAL]

Work backwards with me:
1. What does success look like in concrete, measurable terms?
2. What needs to be true 3 months before that?
3. What needs to be true 1 month before that?
4. What needs to be true 1 week from now?
5. What's the one action I can take today?

For each step, flag any assumptions or risks I might be overlooking.`
    },
    {
      title: "Declutter a Decision",
      category: "Clarity",
      description: "Cut through overthinking and get to what you actually want.",
      prompt: `I'm stuck on a decision and need help thinking it through. The decision is: [INSERT DECISION]

Don't tell me what to do. Instead:
1. Ask me what each option would give me
2. Ask me what each option would cost me (time, money, energy, relationships)
3. Ask me which option I'd be embarrassed to explain to someone I respect
4. Ask me which option I'd choose if I knew I couldn't fail

Then reflect back what my answers reveal about my actual values and what I seem to already know but haven't admitted yet.`
    },
    {
      title: "Financial Snapshot",
      category: "Finance",
      description: "Get a clear picture of where your money actually is and where it's going.",
      prompt: `Help me get a clear financial snapshot. I'll share my numbers with you — income, fixed expenses, variable spending, savings, and debts.

After I share them:
1. Calculate my actual savings rate
2. Identify my top 3 spending leaks
3. Show me what happens if I redirect $[X] per month to savings/debt for 12 months
4. Give me 2 specific changes I could make this week that would have the most impact

Be direct. Don't soften the numbers.`
    },
    {
      title: "Energy Audit",
      category: "Habits",
      description: "Map which activities give you energy and which drain it — then optimize your week around that.",
      prompt: `I want to audit my energy, not just my time. For the next few minutes, I'll list everything I do in a typical week. For each thing I mention, ask me to rate it: does it give me energy (+), drain me (-), or feel neutral (0)?

After I've listed everything, help me:
1. See the pattern — what type of activities charge vs. drain me
2. Identify what I'm spending the most energy on that's draining
3. Find where I could add more of what energizes me
4. Design one small experiment for next week based on this`
    },
    {
      title: "Write My Personal Values",
      category: "Mindset",
      description: "Discover your actual values by looking at behavior, not aspiration.",
      prompt: `Help me discover my real values — not the ones I think I should have, but the ones that actually show up in my choices.

Ask me these questions one at a time:
1. Tell me about a decision you made in the last year that you're proud of.
2. Tell me about a time you compromised on something and regretted it.
3. What do you judge other people for? (This often reveals your values.)
4. When have you felt most like yourself?

After each answer, note the value or principle that seems to be driving it. At the end, give me a short list of 5 values that seem to genuinely describe me, with one sentence explaining the evidence for each.`
    },
    {
      title: "Plan a Hard Conversation",
      category: "Relationships",
      description: "Prepare for a difficult conversation without overthinking or avoiding it.",
      prompt: `I need to have a hard conversation with someone and I want to prepare properly. The situation is: [DESCRIBE THE SITUATION]

Help me:
1. Clarify what outcome I actually want from this conversation
2. Identify the one core thing I need to communicate
3. Anticipate how the other person might react and why
4. Draft an opening statement that is honest but not attacking
5. Plan what I'll do if the conversation goes sideways

Keep it practical. I want to actually have this conversation, not avoid it.`
    },
    {
      title: "Rebuild a Broken Habit",
      category: "Habits",
      description: "Restart a habit you've dropped without the guilt spiral.",
      prompt: `I want to restart a habit I've dropped. The habit is: [INSERT HABIT]
I last did it consistently: [TIMEFRAME]
What stopped me: [REASON]

Don't tell me to just be more disciplined. Instead:
1. Help me understand the real reason it stopped (go deeper than the surface reason I gave)
2. Design a smaller, stupider version of this habit I could start tomorrow
3. Give me a specific trigger to attach it to
4. Tell me what the first 7 days should look like, realistically
5. Help me define what "back on track" looks like so I know when I've succeeded`
    },
    {
      title: "Process a Setback",
      category: "Reflection",
      description: "Turn a failure or disappointment into signal instead of noise.",
      prompt: `Something didn't go the way I wanted and I need help processing it. Here's what happened: [DESCRIBE SETBACK]

Don't rush to silver linings. First:
1. Let me vent — just ask me how I feel about it
2. Then help me separate what was in my control vs. what wasn't
3. Ask me what I would do differently, now that I know the outcome
4. Help me identify what this experience is teaching me about my patterns or assumptions
5. Then, and only then, help me find the one useful thing to take forward

I want to feel better because I understand it better, not because you told me it'll be okay.`
    },
    {
      title: "Design a Simple Budget",
      category: "Finance",
      description: "Build a budget that reflects your real life, not an ideal one.",
      prompt: `Help me build a simple budget I'll actually use. I'll tell you my monthly take-home income and my non-negotiable fixed expenses.

Once I share those:
1. Calculate what's left
2. Suggest a simple percentage split for the remaining money (spending, savings, buffer)
3. Help me pick ONE category to track manually this month — not everything
4. Give me a 5-minute weekly check-in routine to keep me honest

Make it boring and sustainable, not perfect.`
    },
  ];

  // ─────────────────────────────────────────
  // App logic
  // ─────────────────────────────────────────

  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const filterBar = document.querySelector('.filter-bar');

  // Collect unique categories
  const categories = ['all', ...new Set(prompts.map(p => p.category))];

  // Build filter buttons
  categories.forEach(cat => {
    if (cat === 'all') return; // already rendered in HTML
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    filterBar.appendChild(btn);
  });

  // Build cards
  prompts.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = p.category;

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${p.title}</span>
        <span class="card-tag">${p.category}</span>
      </div>
      <p class="card-desc">${p.description}</p>
      <div class="prompt-block" id="prompt-${i}">
        <span class="prompt-text">${escapeHtml(p.prompt)}</span>
        <div class="prompt-fade"></div>
      </div>
      <div class="card-actions">
        <button class="btn btn-copy" data-idx="${i}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy prompt
        </button>
        <button class="btn btn-expand" data-idx="${i}">Show more</button>
      </div>
    `;

    grid.appendChild(card);
  });

  updateCount();

  // Filter logic
  let activeFilter = 'all';

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    activeFilter = btn.dataset.cat;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));

    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', activeFilter !== 'all' && card.dataset.cat !== activeFilter);
    });

    updateCount();
  });

  // Copy logic
  grid.addEventListener('click', e => {
    const copyBtn = e.target.closest('.btn-copy');
    if (copyBtn) {
      const idx = copyBtn.dataset.idx;
      navigator.clipboard.writeText(prompts[idx].prompt).then(() => {
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy prompt`;
        }, 2000);
      });
    }

    // Expand logic
    const expandBtn = e.target.closest('.btn-expand');
    if (expandBtn) {
      const idx = expandBtn.dataset.idx;
      const block = document.getElementById(`prompt-${idx}`);
      const expanded = block.classList.toggle('expanded');
      expandBtn.textContent = expanded ? 'Show less' : 'Show more';
    }
  });

  function updateCount() {
    const visible = document.querySelectorAll('.card:not(.hidden)').length;
    countEl.textContent = `${visible} prompt${visible !== 1 ? 's' : ''}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
